<html>

  <head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
  </head>

  <body>
  </body>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

    // Cena
    const scene = new THREE.Scene();

    // Plano de fundo (base)
    const planeGeometry = new THREE.PlaneGeometry(20, 20);
    const planeMaterial = new THREE.MeshBasicMaterial({ color: 0x57f78f });
    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);

    // Cubo
    const boxGeometry = new THREE.BoxGeometry(2, 2, 2);
    const boxMaterial = new THREE.MeshBasicMaterial({ color: 0xcf5132 });
    const box = new THREE.Mesh(boxGeometry, boxMaterial);
    box.position.set(0, 1, 0);
    box.rotation.y = Math.PI / 4;
    box.scale.set(1, 2, 1);
    scene.add(box);

    // Esfera
    const sphereGeometry = new THREE.SphereGeometry(1.5, 32, 32);
    const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x00872f });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.position.set(0, 5, 0);
    sphere.scale.set(2, 2, 2);
    scene.add(sphere);

    // Cone
    const coneGeometry = new THREE.ConeGeometry(1, 3, 32);
    const coneMaterial = new THREE.MeshBasicMaterial({ color: 0x5370cf });
    const cone = new THREE.Mesh(coneGeometry, coneMaterial);
    cone.position.set(8, 5, 2);
    cone.rotation.z = Math.PI / 2;
    scene.add(cone);

    // Cilindro
    const geometry = new THREE.CylinderGeometry(5, 5, 20, 32);
    const material = new THREE.MeshBasicMaterial({ color: 0xffffffff });
    const cylinder = new THREE.Mesh(geometry, material);
    cylinder.position.set(3, 1, 0);
    cylinder.scale.set(0.1, 0.1, 0.1);
    scene.add(cylinder);

    // Câmera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(10, 10, 10);
    camera.lookAt(0, 0, 0);

    // Renderizador
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Controles de órbita
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.update();

    // Responsividade
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animação
    function animate() {
      requestAnimationFrame(animate);
      cone.rotation.y += 0.05;
      renderer.render(scene, camera);
    }

    animate();

  </script>

</html>
